  /test:
    get:
      tags:
        - test-controller
      summary: Получить все тесты
      description: Возвращает все доступные тесты в системе.
      operationId: getTests
      responses:
        '200':
          description: Успешное получение списка тестов
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TestsResponseDTO'
  /test/{test_id}:
    get:
      tags:
        - test-controller
      summary: Получить тест
      description: Возвращает тест с вопросами и респондентами по заданному test_id.
      operationId: getTest
      parameters:
        - name: test_id
          in: path
          description: Идентификатор теста
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешное получение теста
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TestResponseDTO'
  /test/menu/{test_id}:
    get:
      tags:
        - test-controller
      summary: Получить меню теста
      description: Возвращает меню для указанного теста.
      operationId: getTestMenu
      parameters:
        - name: test_id
          in: path
          description: Идентификатор теста
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешное получение меню теста
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TestMenuResponseDTO'
  /result/{test_id}:
    get:
      tags:
        - result-controller
      summary: Получить результаты теста
      description: Возвращает результаты прохождения теста для указанного test_id.
      operationId: getResult
      parameters:
        - name: test_id
          in: path
          description: Идентификатор теста
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешное получение результатов теста
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultResponseDTO'
        '404':
          description: Результаты не найдены
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultResponseDTO'
  /respondent/{test_id}:
    get:
      tags:
        - respondent-controller
      summary: Получить респондентов для теста
      description: Возвращает список респондентов для указанного теста.
      operationId: respondent
      parameters:
        - name: test_id
          in: path
          description: Идентификатор теста
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешное получение списка респондентов
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/RespondentsResponseDTO'
        '404':
          description: Тест не найден
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/RespondentsResponseDTO'
components:
  schemas:
    AnswerTestModel:
      type: object
      properties:
        value:
          type: integer
          description: Значение ответа (0-4)
          format: int32
          example: 3
        comment:
          type: string
          description: Комментарий к ответу
          example: Отличный вопрос, но не совсем понял формулировку
      description: Ответ на тестовый вопрос
    ResultRequestDTO:
      type: object
      properties:
        evaluatedId:
          type: integer
          description: ID оцениваемого пользователя
          format: int32
          example: 456
        evaluatorId:
          type: integer
          description: ID оценивающего пользователя
          format: int32
          example: 789
        startTimeStamp:
          type: integer
          description: Время начала теста (Unix timestamp)
          format: int64
          example: 1710567890
        endTimeStamp:
          type: integer
          description: Время окончания теста (Unix timestamp)
          format: int64
          example: 1710571490
        answers:
          type: array
          description: Ответы на тестовые вопросы
          items:
            $ref: '#/components/schemas/AnswerTestModel'
        skills:
          type: array
          description: Оценки навыков
          items:
            $ref: '#/components/schemas/SkillsTestModel'
      description: Отправка результатов после теста
    SkillsTestModel:
      type: object
      properties:
        skillId:
          type: integer
          description: ID навыка
          format: int32
          example: 12
        value:
          type: number
          description: Среднее значение оценки навыка
          format: double
          example: 3.8
      description: Оценка навыков в тесте
    RespondentsRequestDTO:
      type: object
      properties:
        respondentsIds:
          type: array
          description: Список ID респондентов
          example:
            - 101
            - 102
            - 103
          items:
            type: integer
            description: Список ID респондентов
            format: int32
      description: Респонденты, которые оценивают пользователя
    TestTitleModel:
      type: object
      properties:
        testId:
          type: integer
          format: int64
        title:
          type: string
        startTimeStamp:
          type: integer
          format: int64
        endTimeStamp:
          type: integer
          format: int64
    TestsResponseDTO:
      type: object
      properties:
        nameGroup:
          type: string
        tests:
          type: array
          items:
            $ref: '#/components/schemas/TestTitleModel'
    QuestionTestModel:
      type: object
      properties:
        questionText:
          type: string
        skillsIds:
          type: array
          items:
            type: integer
            format: int32
    TestResponseDTO:
      type: object
      properties:
        title:
          type: string
        evaluatedId:
          type: integer
          format: int64
        evaluatorId:
          type: integer
          format: int64
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionTestModel'
    TestMenuResponseDTO:
      type: object
      properties:
        title:
          type: string
        isGetRespondents:
          type: boolean
        isSelectRespondents:
          type: boolean
        isCompleteEvaluation:
          type: boolean
        isCompleteEvaluated:
          type: boolean
        isCompeteEvaluator:
          type: boolean
        evaluatedRespondents:
          type: array
          items:
            $ref: '#/components/schemas/TestRespondentTitleModel'
        evaluatorRespondents:
          type: array
          items:
            $ref: '#/components/schemas/TestRespondentTitleModel'
        isActiveResult:
          type: boolean
    TestRespondentTitleModel:
      type: object
      properties:
        respondentId:
          type: integer
          format: int64
        fullName:
          type: string
        isComplete:
          type: boolean
    ResultResponseDTO:
      type: object
      properties:
        title:
          type: string
          description: Название теста
          example: Оценка командной работы
        averageResult:
          type: number
          description: Средний результат
          format: double
          example: 4.2
        thisResult:
          type: number
          description: Личный результат
          format: double
          example: 4
        commandResult:
          type: number
          description: Результат команды
          format: double
          example: 4.3
        expertResult:
          type: number
          description: Результат экспертов
          format: double
          example: 4.1
        results:
          type: array
          description: Результаты по навыкам
          items:
            $ref: '#/components/schemas/SkillsResultModel'
        resultComment:
          type: string
          description: Финальный комментарий
          example: В целом хороший результат, но есть куда расти
      description: Результаты теста
    SkillsResultModel:
      type: object
      properties:
        skillName:
          type: string
          description: Название навыка
          example: Командная работа
        averageEvaluation:
          type: number
          description: Средняя оценка по навыку
          format: double
          example: 4.2
        thisEvaluation:
          type: number
          description: Личная оценка
          format: double
          example: 4
        commandEvaluation:
          type: number
          description: Оценка команды
          format: double
          example: 4.3
        expertEvaluation:
          type: number
          description: Оценка эксперта
          format: double
          example: 4.1
        comments:
          type: array
          description: Комментарии
          example:
            - Очень хорошо работает в команде
            - Немного медлит в принятии решений
          items:
            type: string
            description: Комментарии
            example: '["Очень хорошо работает в команде","Немного медлит в принятии решений"]'
      description: Результаты по навыкам
    RespondentModel:
      type: object
      properties:
        respondentId:
          type: integer
          description: ID респондента
          format: int64
          example: 123
        roleId:
          type: integer
          description: ID роли респондента
          format: int32
          example: 2
        fullName:
          type: string
          description: Полное имя респондента
          example: Иванов Иван Иванович
        course:
          type: integer
          description: Курс респондента
          format: int32
          example: 3
      description: Респондент
    RespondentsResponseDTO:
      type: object
      properties:
        minRespondents:
          type: integer
          description: Минимальное количество респондентов
          format: int32
          example: 3
        maxRespondents:
          type: integer
          description: Максимальное количество респондентов
          format: int32
          example: 10
        minHighRoleRespondents:
          type: integer
          description: Минимальное количество администраторов, экспертов или кураторов
          format: int32
          example: 1
        minOtherCourseRespondents:
          type: integer
          description: Минимальное количество респондентов с другого курса
          format: int32
          example: 2
        respondents:
          type: array
          description: Список респондентов
          items:
            $ref: '#/components/schemas/RespondentModel'
      description: Информация о выборе респондентов
