# Profile
spring.application.name=<--PROFILE_NAME-->

# Server config
server.servlet.context-path=/api/v1
server.port=8080

# Database config
spring.datasource.url=<--POSTGRESQL_URL_PATH-->
spring.datasource.username=<--POSTGRESQL_USERNAME-->
spring.datasource.password=<--POSTGRESQL_PASSWORD-->

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.mongodb.uri=<--MONGODB_URL_PATH-->

# Admin config
adminstrator.config.email=<--ADMINISTRATOR_USERNAME-->
adminstrator.config.password=<--ADMINISTRATOR_PASSWORD-->

# Swagger config
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.csrf.enabled=true
springdoc.swagger-ui.enabled=false
